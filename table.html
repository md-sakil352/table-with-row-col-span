<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Table</title>
 <style>
  table,
  th,
  td {
   border: 1px solid black;
   border-collapse: collapse;
   text-align: center;
   padding: 10px;
  }

  tr:nth-child(even) {
   background-color: rgb(0, 255, 13);
  }
 </style>
</head>

<body>
 <table width="50%" style="justify-content: center; align-items: center; margin: auto; margin-top: 50px;">
  <tr>
   <th colspan="2">Name</th>
   <th>Age</th>
  </tr>
  <tr>
   <td>jil</td>
   <td>smith</td>
   <td>25</td>
  </tr>
  <tr>
   <td>jakson</td>
   <td>evaly</td>
   <td rowspan="2">50</td>
  </tr>
  <tr>
   <td>sakil</td>
   <td>forhad</td>
  </tr>


 </table>
</body>

</html>
